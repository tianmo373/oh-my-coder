<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务历史 - Oh My Coder</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/style.css?v=20260506">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .history-toolbar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        .history-search {
            flex: 1;
            padding: 10px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            outline: none;
        }
        .history-search:focus { border-color: var(--primary); }
        .history-list { display: flex; flex-direction: column; gap: 12px; }
        .history-item {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px;
            transition: var(--transition);
            cursor: pointer;
        }
        .history-item:hover { border-color: var(--border-hover); }
        .history-item-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .history-item-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 70%;
        }
        .history-item-meta {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: var(--text-muted);
        }
        .history-item-preview {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 8px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .empty-state { padding: 80px 24px; }
        .btn-delete-task {
            background: none; border: none; cursor: pointer; font-size: 16px;
            opacity: 0.4; transition: all 0.2s; padding: 4px; border-radius: 4px;
        }
        .btn-delete-task:hover { opacity: 1; background: rgba(239,68,68,0.1); }

        /* Modal styles */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center;
            z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.2s;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content {
            background: var(--card); border: 1px solid var(--border); border-radius: 12px;
            max-width: 800px; width: 90%; max-height: 80vh; overflow: auto;
            padding: 24px; transform: scale(0.95); transition: transform 0.2s;
        }
        .modal-overlay.active .modal-content { transform: scale(1); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .modal-title { font-size: 18px; font-weight: 600; }
        .modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text-muted); }
        .modal-body { font-size: 14px; line-height: 1.6; }
        .modal-body pre { background: var(--bg-secondary); padding: 12px; border-radius: 8px; overflow-x: auto; white-space: pre-wrap; }
        .modal-actions { display: flex; gap: 12px; margin-top: 20px; justify-content: flex-end; }

        @media (max-width: 768px) {
            .history-item-title { max-width: 100%; }
            .history-item-meta { flex-wrap: wrap; gap: 8px; }
        }
    </style>
</head>
<body>
    <!-- Nav -->
    <nav class="nav">
        <div class="nav-content">
            <a href="/" class="nav-brand">
                <span class="nav-brand-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" width="36" height="36" style="vertical-align:middle;margin-right:4px"><defs><linearGradient id="gnw" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#f59e0b"/><stop offset="100%" style="stop-color:#06b6d4"/></linearGradient></defs><rect x="1" y="1" width="34" height="34" rx="6" ry="6" fill="#1a1a2e" stroke="url(#gnw)" stroke-width="1"/><text x="18" y="23" font-family="monospace" font-size="13" font-weight="bold" fill="url(#gnw)" text-anchor="middle" letter-spacing="1.5">OMC</text><line x1="5" y1="28" x2="31" y2="28" stroke="#f59e0b" stroke-width="1.2" opacity="0.6"/><rect x="31" y="17" width="2" height="10" rx="0.5" fill="#06b6d4"><animate attributeName="opacity" values="0.8;0.1;0.8" dur="1.2s" repeatCount="indefinite"/></rect></svg></span>
                <span class="nav-brand-name">Oh My Coder</span>
            </a>
            <div class="nav-links" id="navLinks">
                <a href="/" class="nav-link">首页</a>
                <a href="/dashboard" class="nav-link">仪表板</a>
                <a href="/history" class="nav-link active">历史</a>
                <a href="/docs" class="nav-link">文档</a>
                <a href="/settings" class="nav-link">设置</a>
            </div>
            <div class="nav-actions">
                <div class="nav-toggle" id="themeToggle" title="切换主题">☀️</div>
                <button class="nav-hamburger" id="navHamburger">☰</button>
            </div>
        </div>
    </nav>

    <main class="container">
        <h1 class="page-title">📋 任务历史</h1>
        <p class="page-desc">查看所有已执行的任务和结果。</p>

        <div class="history-toolbar">
            <input type="text" class="history-search" id="searchInput" placeholder="🔍 搜索任务...">
            <button class="btn btn-ghost btn-sm" onclick="loadHistory()">刷新</button>
            <button class="btn btn-ghost btn-sm" onclick="clearAllTasks()" style="color:var(--danger);">清除全部</button>
        </div>

        <div class="history-list" id="historyList">
            <div class="empty-state">
                <span class="empty-state-icon">📭</span>
                <div class="empty-state-title">暂无历史记录</div>
                <div class="empty-state-desc">执行任务后，历史记录会出现在这里。</div>
            </div>
        </div>
    </main>

    <!-- Task Detail Modal -->
    <div class="modal-overlay" id="taskModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">任务详情</h2>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body" id="modalBody">
                加载中...
            </div>
            <div class="modal-actions">
                <button class="btn btn-ghost" onclick="closeModal()">关闭</button>
                <button class="btn btn-primary" id="saveReportBtn" onclick="saveReportToDesktop()">📄 保存报告到桌面</button>
            </div>
        </div>
    </div>

    <footer class="footer"><p>Made with ❤️ by Oh My Coder</p></footer>

    <script>
        // XSS escape helper
        function esc(s) { return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

        // Theme
        function loadTheme() {
            const t = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', t);
            document.getElementById('themeToggle').textContent = t === 'dark' ? '☀️' : '🌙';
        }
        document.getElementById('themeToggle').addEventListener('click', () => {
            const c = document.documentElement.getAttribute('data-theme');
            const n = c === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', n);
            document.getElementById('themeToggle').textContent = n === 'dark' ? '☀️' : '🌙';
            localStorage.setItem('theme', n);
        });
        loadTheme();

        // Mobile nav
        document.getElementById('navHamburger').addEventListener('click', () => {
            document.getElementById('navLinks').classList.toggle('open');
        });

        // Load history
        async function loadHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:40px;">加载中...</div>';
            try {
                const res = await fetch('/api/v1/history');
                const data = await res.json();
                const records = data.records || data.history || [];
                if (!records.length) {
                    list.innerHTML = `<div class="empty-state"><span class="empty-state-icon">📭</span><div class="empty-state-title">暂无历史记录</div><div class="empty-state-desc">执行任务后，历史记录会出现在这里。</div></div>`;
                    return;
                }
                list.innerHTML = records.map(r => {
                    const status = r.status || 'unknown';
                    const statusBadge = status === 'completed'
                        ? '<span class="badge badge-success">成功</span>'
                        : status === 'failed'
                            ? '<span class="badge badge-danger">失败</span>'
                            : '<span class="badge badge-muted">' + status + '</span>';
                    const ts = r.started_at || '-';
                    const wf = r.workflow || '-';
                    const model = r.model || '-';
                    const taskId = r.task_id;
                    const taskTitle = (r.task || r.task_id || '').replace(/'/g, '\\\'');
                    const title = taskTitle.length > 40 ? taskTitle.slice(0, 40) + '…' : taskTitle;
                    return `
                        <div class="history-item" data-task-id="${taskId}" onclick="showTaskDetail('${taskId}')">
                            <div class="history-item-header">
                                <span class="history-item-title">${title}</span>
                                <div style="display:flex;align-items:center;gap:8px;">
                                    ${statusBadge}
                                    <button class="btn-delete-task" onclick="event.stopPropagation();deleteTask('${taskId}')" title="删除任务">🗑️</button>
                                </div>
                            </div>
                            <div class="history-item-meta">
                                <span>🕐 ${ts}</span>
                                <span>⚡ ${wf}</span>
                                <span>🤖 ${model}</span>
                                ${r.stats ? `<span>🪙 ${(r.stats.total_tokens || 0).toLocaleString()} tokens</span>` : ''}
                            </div>
                        </div>`;
                }).join('');
            } catch (e) {
                list.innerHTML = `<div class="empty-state"><span class="empty-state-icon">⚠️</span><div class="empty-state-title">加载失败</div><div class="empty-state-desc">无法获取历史记录。</div></div>`;
            }
        }

        // Search
        document.getElementById('searchInput').addEventListener('input', e => {
            const q = e.target.value.toLowerCase();
            document.querySelectorAll('.history-item').forEach(item => {
                const text = item.textContent.toLowerCase();
                item.style.display = text.includes(q) ? '' : 'none';
            });
        });

        loadHistory();

        // Delete task
        async function deleteTask(taskId) {
            if (!confirm('确定要删除这个任务吗？')) return;
            try {
                const res = await fetch(`/api/v1/tasks/${taskId}`, { method: 'DELETE' });
                if (res.ok) {
                    const item = document.querySelector(`[data-task-id="${taskId}"]`);
                    if (item) { item.style.opacity = '0'; item.style.transform = 'translateX(20px)'; setTimeout(() => item.remove(), 300); }
                    setTimeout(() => { if (!document.querySelector('.history-item')) loadHistory(); }, 400);
                } else {
                    alert('删除失败');
                }
            } catch (e) {
                alert('删除失败: ' + e.message);
            }
        }

        // Clear all tasks
        async function clearAllTasks() {
            if (!confirm('确定要清除所有任务记录吗？此操作不可恢复。')) return;
            try {
                const res = await fetch('/api/v1/tasks');
                const data = await res.json();
                const tasks = data.tasks || [];
                for (const t of tasks) {
                    await fetch(`/api/v1/tasks/${t.task_id}`, { method: 'DELETE' });
                }
                loadHistory();
            } catch (e) {
                alert('清除失败: ' + e.message);
            }
        }

        // Current task for modal
        let currentTaskId = null;

        // Show task detail modal
        async function showTaskDetail(taskId) {
            currentTaskId = taskId;
            const modal = document.getElementById('taskModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalBody = document.getElementById('modalBody');
            
            modal.classList.add('active');
            modalTitle.textContent = '任务详情';
            modalBody.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-muted)">加载中...</div>';

            try {
                const res = await fetch(`/api/v1/history/${taskId}`);
                if (!res.ok) throw new Error('任务不存在');
                const task = await res.json();

                modalTitle.textContent = task.task || '任务详情';
                
                let html = `<div style="margin-bottom:16px;">\n                    <p><strong>状态：</strong>${task.status === 'completed' ? '✅ 成功' : '❌ 失败'}</p>\n                    <p><strong>工作流：</strong>${esc(task.workflow || '-')}</p>\n                    <p><strong>模型：</strong>${esc(task.model || '-')}</p>\n                    <p><strong>项目路径：</strong>${esc(task.project_path || '-')}</p>\n                    <p><strong>开始时间：</strong>${esc(task.started_at || '-')}</p>\n                    <p><strong>完成时间：</strong>${esc(task.completed_at || '-')}</p>\n                </div>`;

                if (task.stats) {
                    html += `<h3 style="margin:16px 0 8px;font-size:15px;">📊 统计</h3>\n                    <p>Tokens: ${(task.stats.total_tokens || 0).toLocaleString()}</p>\n                    <p>执行时间: ${task.stats.execution_time || 0}s</p>\n                    <p>完成步骤: ${esc((task.stats.steps_completed || []).join(', ') || '-')}</p>`;
                }

                if (task.result) {
                    html += `<h3 style="margin:16px 0 8px;font-size:15px;">📝 结果</h3>`;
                    if (typeof task.result === 'object') {
                        html += `<pre>${esc(JSON.stringify(task.result, null, 2))}</pre>`;
                    } else {
                        html += `<pre>${esc(task.result)}</pre>`;
                    }
                }

                if (task.error) {
                    html += `<h3 style="margin:16px 0 8px;font-size:15px;color:var(--danger)">⚠️ 错误</h3>\n                    <pre style="color:var(--danger)">${esc(task.error)}</pre>`;
                }

                modalBody.innerHTML = html;
            } catch (e) {
                modalBody.innerHTML = `<div style="color:var(--danger)">加载失败: ${esc(e.message)}</div>`;
            }
        }

        // Close modal
        function closeModal() {
            document.getElementById('taskModal').classList.remove('active');
            currentTaskId = null;
        }

        // Save report to desktop
        async function saveReportToDesktop() {
            if (!currentTaskId) return;
            
            const btn = document.getElementById('saveReportBtn');
            btn.disabled = true;
            btn.textContent = '保存中...';

            try {
                const res = await fetch('/api/v1/save-report', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ task_id: currentTaskId })
                });
                const data = await res.json();
                if (res.ok) {
                    btn.textContent = '✅ 已保存';
                    alert(`报告已保存到: ${data.path}`);
                } else {
                    throw new Error(data.detail || '保存失败');
                }
            } catch (e) {
                btn.textContent = '📄 保存报告到桌面';
                btn.disabled = false;
                alert('保存失败: ' + e.message);
            }
        }

        // Close modal on overlay click
        document.getElementById('taskModal').addEventListener('click', (e) => {
            if (e.target.id === 'taskModal') closeModal();
        });
    </script>
</body>
</html>
