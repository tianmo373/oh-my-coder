<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目仪表板 - Oh My Coder</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/style.css?v=20260506">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 32px;
        }
        .dash-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            transition: var(--transition);
        }
        .dash-card:hover { border-color: var(--border-hover); }
        .dash-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .dash-card-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
        }
        .dash-card-icon { font-size: 20px; }
        .dash-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
            font-family: var(--font-mono);
        }
        .dash-label {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
        }
        .agent-list { display: flex; flex-direction: column; gap: 8px; }
        .agent-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--bg-secondary);
            border-radius: var(--radius);
            font-size: 14px;
        }
        .agent-dot {
            width: 8px; height: 8px; border-radius: 50%;
        }
        .agent-dot.idle { background: var(--text-muted); }
        .agent-dot.running { background: var(--success); animation: pulse 1.5s infinite; }
        .agent-dot.error { background: var(--danger); }
        .agent-name { font-weight: 600; color: var(--text); flex: 1; }
        .agent-status { font-size: 12px; color: var(--text-muted); }
        .file-list { display: flex; flex-direction: column; gap: 4px; }
        .file-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            font-family: var(--font-mono);
            font-size: 13px;
            color: var(--text-secondary);
            border-radius: 6px;
        }
        .file-item:hover { background: var(--bg-secondary); }
        .file-icon { color: var(--text-muted); }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

        @media (max-width: 768px) {
            .dashboard-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- Nav -->
    <nav class="nav">
        <div class="nav-content">
            <a href="/" class="nav-brand">
                <span class="nav-brand-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" width="36" height="36" style="vertical-align:middle;margin-right:4px"><defs><linearGradient id="gnw" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#f59e0b"/><stop offset="100%" style="stop-color:#06b6d4"/></linearGradient></defs><rect x="1" y="1" width="34" height="34" rx="6" ry="6" fill="#1a1a2e" stroke="url(#gnw)" stroke-width="1"/><text x="18" y="23" font-family="monospace" font-size="13" font-weight="bold" fill="url(#gnw)" text-anchor="middle" letter-spacing="1.5">OMC</text><line x1="5" y1="28" x2="31" y2="28" stroke="#f59e0b" stroke-width="1.2" opacity="0.6"/><rect x="31" y="17" width="2" height="10" rx="0.5" fill="#06b6d4"><animate attributeName="opacity" values="0.8;0.1;0.8" dur="1.2s" repeatCount="indefinite"/></rect></svg></span>
                <span class="nav-brand-name">Oh My Coder</span>
            </a>
            <div class="nav-links" id="navLinks">
                <a href="/" class="nav-link">首页</a>
                <a href="/dashboard" class="nav-link active">仪表板</a>
                <a href="/history" class="nav-link">历史</a>
                <a href="/coverage" class="nav-link">覆盖率</a>
                <a href="/docs" class="nav-link">文档</a>
                <a href="/settings" class="nav-link">设置</a>
            </div>
            <div class="nav-actions">
                <div class="nav-toggle" id="themeToggle" title="切换主题">☀️</div>
                <button class="nav-hamburger" id="navHamburger">☰</button>
            </div>
        </div>
    </nav>

    <main class="container-wide">
        <h1 class="page-title">📊 项目仪表板</h1>
        <p class="page-desc">实时查看项目状态、Agent 协作和运行指标。</p>

        <div class="dashboard-grid">
            <div class="dash-card">
                <div class="dash-card-header">
                    <span class="dash-card-title">已完成任务</span>
                    <span class="dash-card-icon">✅</span>
                </div>
                <div class="dash-value" id="totalTasks">0</div>
                <div class="dash-label">累计执行</div>
            </div>
            <div class="dash-card">
                <div class="dash-card-header">
                    <span class="dash-card-title">Token 消耗</span>
                    <span class="dash-card-icon">🪙</span>
                </div>
                <div class="dash-value" id="totalTokens">0</div>
                <div class="dash-label">Total Tokens</div>
            </div>
            <div class="dash-card">
                <div class="dash-card-header">
                    <span class="dash-card-title">估算成本</span>
                    <span class="dash-card-icon">💰</span>
                </div>
                <div class="dash-value" id="totalCost">¥0</div>
                <div class="dash-label">DeepSeek 免费额度内</div>
            </div>
        </div>

        <div class="dashboard-grid" style="grid-template-columns: 1fr 1fr;">
            <div class="dash-card">
                <div class="dash-card-header">
                    <span class="dash-card-title">🤖 Agent 状态</span>
                </div>
                <div class="agent-list" id="agentList">
                    <div class="agent-item"><div class="agent-dot idle"></div><span class="agent-name">🔍 Explorer</span><span class="agent-status">空闲</span></div>
                    <div class="agent-item"><div class="agent-dot idle"></div><span class="agent-name">🧠 Analyst</span><span class="agent-status">空闲</span></div>
                    <div class="agent-item"><div class="agent-dot idle"></div><span class="agent-name">🏗️ Architect</span><span class="agent-status">空闲</span></div>
                    <div class="agent-item"><div class="agent-dot idle"></div><span class="agent-name">💻 Executor</span><span class="agent-status">空闲</span></div>
                    <div class="agent-item"><div class="agent-dot idle"></div><span class="agent-name">✅ Verifier</span><span class="agent-status">空闲</span></div>
                    <div class="agent-item"><div class="agent-dot idle"></div><span class="agent-name">🐛 Debugger</span><span class="agent-status">空闲</span></div>
                    <div class="agent-item"><div class="agent-dot idle"></div><span class="agent-name">🔎 Reviewer</span><span class="agent-status">空闲</span></div>
                    <div class="agent-item"><div class="agent-dot idle"></div><span class="agent-name">🛡️ Security</span><span class="agent-status">空闲</span></div>
                </div>
            </div>
            <div class="dash-card">
                <div class="dash-card-header">
                    <span class="dash-card-title">📁 项目文件</span>
                    <button class="btn btn-sm btn-ghost" id="openProjectBtn" title="打开项目文件夹">📂 打开</button>
                </div>
                <div class="file-list" id="fileList">
                    <div style="color:var(--text-muted);font-size:14px;">加载中...</div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer"><p>Made with ❤️ by Oh My Coder</p></footer>

    <script>
        // XSS escape helper
        function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
        // Theme
        function loadTheme() {
            const t = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', t);
            document.getElementById('themeToggle').textContent = t === 'dark' ? '☀️' : '🌙';
        }
        document.getElementById('themeToggle').addEventListener('click', () => {
            const c = document.documentElement.getAttribute('data-theme');
            const n = c === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', n);
            document.getElementById('themeToggle').textContent = n === 'dark' ? '☀️' : '🌙';
            localStorage.setItem('theme', n);
        });
        loadTheme();

        // Mobile nav
        document.getElementById('navHamburger').addEventListener('click', () => {
            document.getElementById('navLinks').classList.toggle('open');
        });

        // Load dashboard data
        async function loadDashboard() {
            try {
                const res = await fetch('/api/v1/dashboard/stats');
                const data = await res.json();
                if (data.total_tasks !== undefined) document.getElementById('totalTasks').textContent = data.total_tasks;
                if (data.total_tokens !== undefined) document.getElementById('totalTokens').textContent = data.total_tokens.toLocaleString();
                if (data.total_cost !== undefined) document.getElementById('totalCost').textContent = '¥' + data.total_cost.toFixed(4);
            } catch (e) {}

            try {
                const res = await fetch('/api/v1/dashboard/files');
                const data = await res.json();
                if (data.files) {
                    document.getElementById('fileList').innerHTML = data.files.slice(0, 15).map(f =>
                        `<div class="file-item" onclick="openFile('${escHtml(f.path)}')" style="cursor:pointer;" title="点击打开文件所在文件夹"><span class="file-icon">📄</span><span>${escHtml(f.name)}</span><span style="margin-left:auto;color:var(--text-muted)">${escHtml(f.size || '')}</span></div>`
                    ).join('');
                    // 设置"打开项目文件夹"按钮
                    if (data.project_path) {
                        document.getElementById('openProjectBtn').onclick = () => openFolder(data.project_path);
                    }
                }
            } catch (e) {
                document.getElementById('fileList').innerHTML = '<div style="color:var(--text-muted);font-size:14px;">无法加载文件列表</div>';
            }
        }
        loadDashboard();

        // 打开文件所在文件夹
        async function openFile(filePath) {
            try {
                await fetch('/api/v1/open-folder', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({path: filePath})
                });
            } catch (e) {
                console.error('打开文件失败:', e);
            }
        }

        // 打开文件夹
        async function openFolder(folderPath) {
            try {
                await fetch('/api/v1/open-folder', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({path: folderPath})
                });
            } catch (e) {
                console.error('打开文件夹失败:', e);
            }
        }
    </script>
</body>
</html>
