name: review
description: 代码审查流程：探索 → 代码审查 + 安全审查（并行）
steps:
  - id: explore
    agent: explore
    description: 探索代码库结构
    timeout: 300
    retry: 0
  - id: code-reviewer
    agent: code-reviewer
    description: 代码审查
    dependencies: [explore]
    timeout: 600
    retry: 0
  - id: security-reviewer
    agent: security-reviewer
    description: 安全审查
    dependencies: [explore]
    timeout: 600
    retry: 0
