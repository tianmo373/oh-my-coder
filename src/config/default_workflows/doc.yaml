name: doc
description: 文档生成流程：架构设计 → 初稿撰写 → 长篇精修 → 完整性校验
steps:
  - id: architect
    agent: architect
    description: 架构设计与文档框架
    timeout: 300
    retry: 0
  - id: writer
    agent: writer
    description: 内容初稿撰写
    dependencies: [architect]
    timeout: 600
    retry: 1
  - id: document
    agent: document
    description: 长篇文档精修与格式化
    dependencies: [writer]
    timeout: 600
    retry: 0
  - id: verifier
    agent: verifier
    description: 文档完整性校验
    dependencies: [document]
    timeout: 300
    retry: 0
