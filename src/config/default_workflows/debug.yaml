name: debug
description: 调试修复流程：探索 → 调试 → 验证
steps:
  - id: explore
    agent: explore
    description: 探索代码库定位问题
    timeout: 300
    retry: 0
  - id: debugger
    agent: debugger
    description: 调试并修复问题
    dependencies: [explore]
    timeout: 600
    retry: 1
  - id: verifier
    agent: verifier
    description: 验证修复正确性
    dependencies: [debugger]
    timeout: 300
    retry: 0
