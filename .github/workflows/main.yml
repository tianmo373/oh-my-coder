name: Sync upstream

on:
  schedule:
    # 每天 UTC 时间 0 点运行一次（可按需调整）
    - cron: '0 0 * * *'
  
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Sync upstream changes
        uses: repo-sync/pull-request@v2
        with:
          source_branch: "main"
          destination_branch: "main"
          github_token: ${{ secrets.GITHUB_TOKEN }}
          pr_title: "chore: 自动同步上游仓库更新"
          pr_body: "由 GitHub Actions 自动创建，检测到上游仓库有新的提交。"
          pr_allow_empty: false
          # pr_merge_method: "merge"
          # auto_approve: true
