name: 🐛 Bug Report
description: Report a bug or unexpected behavior
title: "[Bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please provide as much detail as possible to help us reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what went wrong
      placeholder: When I run `omc chat`, the process hangs indefinitely without any output...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the bug
      placeholder: |
        1. Run `omc config set model=gpt-4`
        2. Run `omc chat "hello"`
        3. Process hangs at "Loading..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
      placeholder: The chat should complete and return a response within 10 seconds
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened (include error messages if any)
      placeholder: |
        Process hangs with no output. After Ctrl+C, shows:
        ```
        ^CTraceback (most recent call last):
          File "...", line 45, in chat
        ```
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Your system information
      placeholder: |
        - OS: macOS 14.4
        - Python: 3.11.7
        - omc version: 0.5.2
        - Installation: pip install oh-my-coder
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: Your omc configuration (redact sensitive info like API keys)
      placeholder: |
        ```toml
        [llm]
        model = "gpt-4"
        base_url = "https://api.openai.com/v1"
        
        [agent]
        timeout = 30
        ```
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission Checks
      options:
        - label: I have searched existing issues and this bug has not been reported
        - label: I can reproduce this bug consistently
        - label: I have tested with the latest version of omc
    validations:
      required: true
