strict: false  # 允许外部 repo 链接（README.md, CONTRIBUTING.md 等）

site_name: Oh My Coder 文档
site_description: 🤖 多智能体 AI 编程助手，支持国内大模型，31 个专业 Agent，多 Agent 协作
site_author: VOBC
site_url: https://vobc.github.io/oh-my-coder/

repo_name: VOBC/oh-my-coder
repo_url: https://github.com/VOBC/oh-my-coder
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  features:
    - navigation.instant
    - navigation.trimming
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - content.action.view

plugins:
  - search:
      lang:
        - en
        - zh

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/VOBC/oh-my-coder
  generator: false
  analytics:
    provider: google
    property: G-XXXXXXXXXX

nav:
  - Home: index.md
  - Guide:
    - guide/install.md
    - guide/quick-start.md
    - guide/models.md
    - guide/free-models.md
    - guide/agents.md
    - guide/workflows.md
    - guide/memory-system.md
    - guide/checkpoint.md
    - guide/auto-skill.md
  - API:
    - api/cli.md
    - api/http-api.md
  - Features:
    - features/capability-pack.md
    - features/checkpoint.md
    - features/mcp-server.md
  - 中文:
    - 首页: zh/index.md
    - 快速开始: zh/getting-started.md
    - 教程: zh/tutorials.md
    - 安装指南: zh/guide/install.md
    - 快速开始详细: zh/guide/quick-start.md
    - 模型配置: zh/guide/models.md
    - 模型详细配置: zh/guide/model-config.md
    - Agent 介绍: zh/guide/agents.md
    - 工作流说明: zh/guide/workflows.md
    - 部署说明: zh/guide/deployment.md
    - 竞品对比: zh/guide/comparison.md
    - 常见问题: zh/FAQ.md
    - 功能特性:
      - zh/features/active-learning.md
      - zh/features/capability-pack.md
      - zh/features/checkpoint.md
      - zh/features/gep-protocol.md
      - zh/features/mcp-server.md
      - zh/features/quest-mode.md
    - 开发文档:
      - zh/dev/architecture.md
      - zh/dev/development-report.md
      - zh/dev/progress.md
      - zh/dev/task-tracking.md
      - zh/dev/testing.md
    - 安全文档:
      - zh/security/CODEQL_SOLUTIONS.md
      - zh/security/coding-guide.md
      - zh/security/security-whackamole-investigation.md
      - zh/security/user-guide.md
