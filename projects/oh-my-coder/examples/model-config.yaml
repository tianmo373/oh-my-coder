# ============================================================
# oh-my-coder 自定义模型配置模板
# 放置到 ~/.omc/models/ 目录下，重启 omc 即可使用
# ============================================================
#
# 必填字段：name / provider / model
# 选填字段：tier（free|low|medium|high，默认 medium）
#
# provider 可选值：
#   deepseek, glm, kimi, doubao, minimax, baichuan,
#   tiangong, wenxin, tongyi, hunyuan, spark, mimo,
#   openai, anthropic, google, ollama
# ============================================================

# 示例：添加本地 Ollama 模型
- name: Ollama 本地模型          # omc models list 中显示的名称
  provider: ollama               # Ollama 本地模型
  model: llama3:latest           # Ollama 中注册的模型 ID
  tier: free                     # 计费等级（免费）
  description: 本地部署的 Llama3 模型

# 示例：添加第三方 OpenAI 兼容模型
- name: 我的自定义模型
  provider: openai
  model: my-model-name
  base_url: https://your-api-endpoint.com/v1
  api_key: your-api-key-here
  tier: medium
  description: 自定义的 OpenAI 兼容模型
